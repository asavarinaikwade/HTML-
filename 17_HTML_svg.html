<!DOCTYPE html>
<html>
<head>
    <title>Doraemon SVG</title>
</head>
<body style="background:#f0f0f0; display:flex; justify-content:center; align-items:center; height:100vh;">

<svg width="400" height="500" viewBox="0 0 400 500">

    <!-- Head -->
    <circle cx="200" cy="180" r="140" fill="#00AEEF" stroke="black" stroke-width="3"/>

    <!-- Face -->
    <circle cx="200" cy="210" r="115" fill="white" stroke="black" stroke-width="2"/>

    <!-- Eyes -->
    <ellipse cx="175" cy="130" rx="30" ry="40" fill="white" stroke="black" stroke-width="2"/>
    <ellipse cx="225" cy="130" rx="30" ry="40" fill="white" stroke="black" stroke-width="2"/>

    <!-- Pupils -->
    <circle cx="190" cy="145" r="8" fill="black"/>
    <circle cx="210" cy="145" r="8" fill="black"/>

    <!-- Nose -->
    <circle cx="200" cy="175" r="18" fill="red" stroke="black" stroke-width="2"/>
    <circle cx="194" cy="168" r="5" fill="white"/>

    <!-- Nose Line -->
    <line x1="200" y1="193" x2="200" y2="260"
          stroke="black" stroke-width="2"/>

    <!-- Mouth -->
    <path d="M130 240 Q200 320 270 240"
          fill="none" stroke="black" stroke-width="3"/>

    <!-- Whiskers -->
    <line x1="80" y1="190" x2="160" y2="205" stroke="black" stroke-width="2"/>
    <line x1="80" y1="220" x2="160" y2="220" stroke="black" stroke-width="2"/>
    <line x1="80" y1="250" x2="160" y2="235" stroke="black" stroke-width="2"/>

    <line x1="240" y1="205" x2="320" y2="190" stroke="black" stroke-width="2"/>
    <line x1="240" y1="220" x2="320" y2="220" stroke="black" stroke-width="2"/>
    <line x1="240" y1="235" x2="320" y2="250" stroke="black" stroke-width="2"/>

    <!-- Collar -->
    <rect x="105" y="315" width="190" height="25"
          rx="10" fill="red" stroke="black" stroke-width="2"/>

    <!-- Bell -->
    <circle cx="200" cy="355" r="25"
            fill="#FFD700" stroke="black" stroke-width="2"/>
    <line x1="180" y1="350" x2="220" y2="350"
          stroke="black" stroke-width="2"/>
    <circle cx="200" cy="360" r="5" fill="black"/>
    <line x1="200" y1="365" x2="200" y2="380"
          stroke="black" stroke-width="2"/>

</svg>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Solar System SVG</title>

<style>
body{
    margin:0;
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
}

svg{
    width:100vw;
    height:100vh;
}

.orbit{
    fill:none;
    stroke:#444;
    stroke-width:1;
}

.star{
    fill:white;
}
</style>
</head>
<body>

<svg viewBox="0 0 1000 1000">

    <!-- Background stars -->
    <g id="stars"></g>

    <!-- Sun -->
    <circle cx="500" cy="500" r="45" fill="gold">
        <animate attributeName="r"
                 values="42;48;42"
                 dur="2s"
                 repeatCount="indefinite"/>
    </circle>

    <!-- Orbits -->
    <circle class="orbit" cx="500" cy="500" r="80"/>
    <circle class="orbit" cx="500" cy="500" r="120"/>
    <circle class="orbit" cx="500" cy="500" r="170"/>
    <circle class="orbit" cx="500" cy="500" r="230"/>
    <circle class="orbit" cx="500" cy="500" r="300"/>

    <!-- Mercury -->
    <g>
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 500 500"
            to="360 500 500"
            dur="4s"
            repeatCount="indefinite"/>
        <circle cx="580" cy="500" r="6" fill="#aaa"/>
    </g>

    <!-- Venus -->
    <g>
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 500 500"
            to="360 500 500"
            dur="7s"
            repeatCount="indefinite"/>
        <circle cx="620" cy="500" r="10" fill="#d9b38c"/>
    </g>

    <!-- Earth -->
    <g>
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 500 500"
            to="360 500 500"
            dur="10s"
            repeatCount="indefinite"/>
        <circle cx="670" cy="500" r="12" fill="deepskyblue"/>

        <!-- Moon -->
        <g>
            <animateTransform
                attributeName="transform"
                type="rotate"
                from="0 670 500"
                to="360 670 500"
                dur="2s"
                repeatCount="indefinite"/>
            <circle cx="690" cy="500" r="4" fill="#ddd"/>
        </g>
    </g>

    <!-- Mars -->
    <g>
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 500 500"
            to="360 500 500"
            dur="16s"
            repeatCount="indefinite"/>
        <circle cx="730" cy="500" r="9" fill="tomato"/>
    </g>

    <!-- Jupiter -->
    <g>
        <animateTransform
            attributeName="transform"
            type="rotate"
            from="0 500 500"
            to="360 500 500"
            dur="25s"
            repeatCount="indefinite"/>
        <circle cx="800" cy="500" r="22" fill="orange"/>
    </g>

</svg>

<script>
// Generate random stars
const stars = document.getElementById("stars");

for(let i=0;i<300;i++){
    const star = document.createElementNS(
        "http://www.w3.org/2000/svg",
        "circle"
    );

    star.setAttribute("cx", Math.random()*1000);
    star.setAttribute("cy", Math.random()*1000);
    star.setAttribute("r", Math.random()*2);

    star.setAttribute("class", "star");

    stars.appendChild(star);
}
</script>

</body>
</html>
